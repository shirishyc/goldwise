version: "3.8"
services:
  goldwise:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4567:4567"
    environment:
      - PORT=4567
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4567/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
